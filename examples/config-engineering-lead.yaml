brain:
  root: Brain
  bets_dir: Brain/Bets
  bets_index: Brain/Bets/BETS.md
  conflicts_file: Brain/CONFLICTS.md

roles:
  - id: manager
    name: Manager
  - id: engineer
    name: Engineer
    reports_to: manager
  - id: designer
    name: Designer
    reports_to: manager
  - id: pm
    name: Product Manager
    reports_to: manager

horizons:
  this-week: 7
  this-month: 30
  this-quarter: 90
  strategic: 180

# Signal sources should be *low-noise external state changes*, not the same
# directories you used as bet source corpus during `cns-bootstrap
# --from-existing`. See examples/config-solo-founder.yaml for the full
# rationale. Code changes (git_commits, github_prs) are high-signal; the
# `notes/` dir below is fine if it's NOT where your bets were extracted from.
signal_sources:
  - kind: vault_dir
    path: notes
  - kind: git_commits
    repos:
      - ../my-project

detection:
  window_hours: 24
  match_strategy: substring
  cross_bet_check: true
  staleness_check: true
