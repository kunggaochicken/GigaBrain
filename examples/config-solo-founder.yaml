brain:
  root: Brain
  bets_dir: Brain/Bets
  bets_index: Brain/Bets/BETS.md
  conflicts_file: Brain/CONFLICTS.md

roles:
  - id: ceo
    name: CEO
  - id: cto
    name: CTO
    reports_to: ceo
  - id: cso
    name: Chief Scientist Officer
    reports_to: ceo
  - id: cmo
    name: CMO
    reports_to: ceo
  - id: cpo
    name: CPO
    reports_to: ceo
  - id: clo
    name: CLO
    reports_to: ceo
  - id: cfo
    name: CFO
    reports_to: ceo

horizons:
  this-week: 7
  this-month: 30
  this-quarter: 90
  strategic: 180

# Signal sources are external state changes that might invalidate a bet's
# assumptions. The right pattern is *low-noise external state* (real changes
# in code or PRs), not *high-noise free-form thinking* (Daily/, Strategy/).
#
# CRITICAL: do NOT include directories that were used as bet *source corpus*.
# If you ran `cns-bootstrap --from-existing Strategy/ Research/` to extract
# bets from those dirs, the bets will trivially match their own source files
# (substring detection finds the same vocabulary on both sides). The detector
# will fire ~1-2 conflicts per bet against the corpus they came from.
#
# Recommended (low-noise, high-signal):
#   - kind: git_commits
#     repos: [../my-app, ../my-cli]
#   - kind: github_prs
#     repos: [my-org/my-app]
#     auth: gh_cli
#
# Optionally include vault dirs that are NOT bet derivation sources:
#   - kind: vault_dir
#     path: Daily   # free-form daily notes (high noise but timely)
#   - kind: vault_dir
#     path: memory  # decisions/learnings (medium noise)
#
# DO NOT include without thinking carefully:
#   - Strategy/ if you bootstrapped from it
#   - Marketing/ if you bootstrapped from it
#   - Research/ if you bootstrapped from it
signal_sources: []

detection:
  window_hours: 24
  match_strategy: substring
  cross_bet_check: true
  staleness_check: true

automation:
  daily_report:
    integration: optional
    inject_tldr_line: true
    daily_note_dir: Daily
